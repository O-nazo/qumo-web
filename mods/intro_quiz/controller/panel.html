<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="./panel.css" />
  <title>IntroQuiz Panel</title>
</head>
<body>
  <div class="wrap">
    <section class="hero card">
      <div class="heroControls">
        <select id="setSelect" title="問題セット"></select>
        <button id="btnPlay" class="accent">再生</button>
        <button id="btnChorus">サビ再生</button>
        <button id="btnRewind">巻き戻し</button>
        <button id="btnAnswer">解答表示</button>
        <button id="btnReset">問題リセット</button>
      </div>
    </section>

    <div class="grid">
      <section class="card">
        <h2>現在の問題</h2>
        <div class="nowPlaying">
          <div class="pillRow">
            <span id="phaseBadge" class="pill">IDLE</span>
            <span id="providerBadge" class="pill subtle">-</span>
            <span id="playlistBadge" class="pill subtle">-</span>
          </div>
          <div id="title" class="title">(no title)</div>
          <div id="artist" class="artist"></div>
          <div id="year" class="metaSub"></div>
          <div id="answerText" class="answer"></div>
          <div id="notes" class="notes"></div>
        </div>
        <div class="transport">
          <div class="timeLine">
            <div class="transportButtons">
              <button id="btnTransportRewind" title="巻き戻し">⏮</button>
              <button id="btnTransportPlay" class="accent" title="再生 / 停止">▶</button>
              <button id="btnTransportStop" title="停止">⏹</button>
              <button id="btnTransportForward" title="早送り">⏭</button>
            </div>
            <input id="seekBar" type="range" min="0" max="1000" value="0" step="1" disabled />
            <div id="timeLabel">0:00 / 0:00</div>
          </div>
          <div class="stats">
            <label class="cueField">
              <span>Intro</span>
              <input id="introCueInput" type="number" min="0" step="0.1" />
            </label>
            <label class="cueField">
              <span>サビ</span>
              <input id="chorusCueInput" type="number" min="0" step="0.1" />
            </label>
            <label class="cueField cueFieldWide">
              <span>YouTube音量</span>
              <div class="volumeRow">
                <input id="youtubeVolumeInput" type="range" min="0" max="100" step="1" />
                <strong id="youtubeVolumeValue">100%</strong>
              </div>
            </label>
          </div>
        </div>
        <div class="navRow">
          <button id="btnPrev">前へ</button>
          <button id="btnNext">次へ</button>
        </div>
      </section>

      <section class="card problemListCard">
        <h2>問題リスト</h2>
        <div class="problemListBody">
          <div id="list" class="list"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="./panel.js"></script>
</body>
</html>
