<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="./main.css" />
</head>
<body>
  <main class="stage">
    <div class="hud">
      <div class="centerColumn">
        <div id="phase" class="phase">STAND-BY</div>
        <div class="timerStack">
          <div id="timer" class="timer">01:00:00</div>
          <div id="timerMask" class="timerMask" hidden>??:??:??</div>
        </div>
        <div class="metaRow">
          <div class="statBlock">
            <div class="metaLabel">REMAIN</div>
            <div class="remainingWrap">
              <div id="remaining" class="remaining">00</div>
              <div id="remainingUnit" class="remainingUnit"></div>
            </div>
          </div>

          <div id="passBlock" class="statBlock passBlock" hidden>
            <div class="metaLabel">PASS</div>
            <div class="remainingWrap passWrap">
              <div id="passValue" class="remaining">10</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
