<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="./panel.css" />
  <title>Timerace Panel</title>
</head>
<body>
  <div class="wrap">
    <section class="card hero">
      <div class="eyebrow">Time Race</div>
      <div id="phaseText" class="phaseText">待機中</div>
      <div id="clock" class="clock">01:00:00</div>
      <div id="summary" class="summary">残り 0 / 0</div>
    </section>

    <section class="card controls">
      <label class="field">
        <span>タイマー時間（秒）</span>
        <input id="durationSec" type="number" min="5" max="3599" step="1" value="60" />
      </label>

      <div class="buttonRow">
        <button id="btnStart" class="primary">スタート</button>
        <button id="btnStop">ストップ</button>
        <button id="btnReset" class="danger">リセット</button>
      </div>
    </section>
  </div>

  <script src="./panel.js"></script>
</body>
</html>
