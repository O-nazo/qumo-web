<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="./panel.css" />
  <title>Visual Quiz Panel</title>
</head>
<body>
  <div class="wrap">
    <div class="toolbarRow toolbarRowLarge">
      <div class="toolbarGroup toolbarGroupRight">
        <select id="setSelect" title="問題セット"></select>
        <button id="btnStart">START</button>
        <button id="btnMediaToggle" title="再生 / 一時停止">▶️</button>
        <div class="seekWrap">
          <input id="seekBar" type="range" min="0" max="1000" value="0" step="1" aria-label="シークバー" />
          <div id="seekTime" class="seekTime">0:00 / 0:00</div>
        </div>
        <button id="btnOpen">開</button>
        <button id="btnClose">閉</button>
        <button id="btnAnswer">解答表示</button>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h3>プレビュー</h3>
        <div class="preview">
          <div class="thumbWrap">
            <img id="previewImg" alt="" />
            <video id="previewVideo" playsinline preload="metadata" hidden></video>
          </div>
          <div class="meta">
            <div id="previewQ" class="q"></div>
            <div id="previewA" class="a"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <h3>問題リスト</h3>
        <div id="list" class="list"></div>
      </section>
    </div>
  </div>

  <script src="/common/numberInputWheel.js"></script>
  <script src="./panel.js"></script>
</body>
</html>
