<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="./panel.css" />
  <title>Visual Quiz Panel</title>
</head>
<body>
  <div class="wrap">
    <div class="toolbarRow">
      <div class="toolbarGroup">
        <button id="btnPresentCore">出題</button>
        <button id="btnSkip">スルー</button>
      </div>
      <div class="toolbarGroup toolbarGroupRight">
        <button id="btnAnswer">解答表示</button>
      </div>
    </div>

    <div class="toolbarRow toolbarRowLarge">
      <div class="toolbarGroup">
        <button id="btnStart">START</button>
        <button id="btnCorrectCore" class="danger">正解</button>
        <button id="btnWrongCore" class="primary">誤答</button>
      </div>
      <div class="toolbarGroup toolbarGroupRight">
        <button id="btnOpen">開</button>
        <button id="btnClose">閉</button>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h3>プレビュー</h3>
        <div class="preview">
          <div class="thumbWrap">
            <img id="previewImg" alt="" />
          </div>
          <div class="meta">
            <div id="previewQ" class="q"></div>
            <div id="previewA" class="a"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <h3>問題リスト</h3>
        <div id="list" class="list"></div>
      </section>
    </div>
  </div>

  <script src="./panel.js"></script>
</body>
</html>
