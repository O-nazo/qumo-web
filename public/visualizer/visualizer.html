<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/common/common.css" />
  <link rel="stylesheet" href="/visualizer/visualizer.css" />
</head>
<body>
  <!-- 上：MOD main（画面の大部分） -->
  <div id="mod-main-root" class="modMainRoot"></div>

  <!-- 下：共通HUD -->
  <div id="hud-root" class="hudRoot">
    <header class="top">
      <h1>クモノス QUMO-web</h1>
    </header>

    <main>
      <section>
        <h2>Players</h2>
        <div id="playersGrid" class="grid"></div>
      </section>
    </main>
  </div>

  <div id="joinQrOverlay" class="qrOverlay" hidden>
    <div class="qrBox">
      <div class="qrTitle">ここから参加！</div>
      <img id="joinQrImg" alt="Player QR" />
      <div id="joinQrText" class="qrText"></div>
      <div id="joinQrHint" class="qrHint"></div>
    </div>
  </div>

  <script src="/common/modApi.js"></script>
  <script type="module" src="/visualizer/visualizer.js"></script>
</body>
</html>
