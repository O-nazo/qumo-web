<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/common/common.css" />
  <link rel="stylesheet" href="/visualizer/visualizer.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- 上：MOD main（画面の大部分） -->
  <div id="mod-main-root" class="modMainRoot"></div>

  <!-- 下：共通HUD -->
  <div id="hud-root" class="hudRoot">
    <main class="playersStage">
      <div id="playersGrid" class="grid"></div>
    </main>
  </div>

  <div id="joinQrOverlay" class="qrOverlay" hidden>
    <div class="qrBox">
      <div class="qrTitle">ここから参加！</div>
      <img id="joinQrImg" alt="Player QR" />
      <div id="joinQrText" class="qrText"></div>
      <div id="joinQrHint" class="qrHint"></div>
    </div>
  </div>

  <div id="rulesOverlay" class="rulesOverlay" hidden>
    <div class="rulesOverlayBox">
      <div id="rulesOverlayTitle" class="rulesOverlayTitle">RULE</div>
      <div id="rulesOverlayBody" class="rulesOverlayBody"></div>
    </div>
  </div>

  <div id="boardFocusOverlay" class="boardFocusOverlay" hidden>
    <div id="boardFocusBody" class="boardFocusBody"></div>
  </div>

  <script src="/common/modApi.js"></script>
  <script type="module" src="/visualizer/visualizer.js"></script>
</body>
</html>
