<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/common/common.css" />
  <link rel="stylesheet" href="/controller/controller.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="overlay" hidden>
    <div class="overlayBg"></div>

       <div class="overlayPanel" id="rulesPanel" hidden>
        <h2>ルール</h2>
        <div class="row">
          <label>
            早押しルール
            <select id="buzzMode" style="width:260px;">
              <option value="endless">全着順判定（エンドレスチャンス）</option>
              <option value="cultq">カルトQ方式</option>
              <option value="single">シングルチャンス</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>
            得点・勝敗ルール
            <select id="ruleProfile" style="width:260px;"></select>
          </label>
        </div>

        <div class="row">
          <label>
            勝ち抜け人数
            <input id="displayQualifyPlayerCount" type="number" min="0" max="1000000" step="1" style="width:140px;">
            人
          </label>
          <label>
            失格人数
            <input id="displayDisqualifiedPlayerCount" type="number" min="0" max="1000000" step="1" style="width:140px;">
            人
          </label>
        </div>

        <div class="ruleProfileGroup" data-rule-profile="standard">
          <div class="row">
            <label>
              正解時の加点
              <input id="correctPoints" type="number" min="-1000" max="1000000" step="1" style="width:140px;">
            </label>
          </div>

          <div class="row">
            <label>
              誤答時の減加
              <input id="wrongPoints" type="number" min="-1000" max="1000000" step="1" style="width:140px;">
            </label>
          </div>

          <div class="row">
            <label>
              誤答罰（次問から休み）
              <input id="restPenalty" type="number" min="0" max="20" step="1" style="width:90px;">
              問
            </label>
          </div>

          <div class="row">
            <label>
              <input id="qualifyEnabled" type="checkbox">
              勝ち抜け 有効
            </label>
            <label>
              目標得点
              <input id="qualifyScore" type="number" min="-1000" max="1000000" step="1" style="width:140px;">
            </label>
          </div>
          <div class="row">
            <label>
              <input id="qualifyCountEnabled" type="checkbox">
              n回正解で勝ち抜け
            </label>
            <input id="qualifyCorrectCount" type="number" value="4" style="width:80px;">
          </div>

          <div class="row">
            <label>
              <input id="dqEnabled" type="checkbox">
              失格 有効
            </label>
            <label>
              失格得点
              <input id="dqScore" type="number" min="-1000" max="1000000" step="1" style="width:140px;">
            </label>
          </div>
          <div class="row">
            <label>
              <input id="dqWrongEnabled" type="checkbox">
              n回誤答で失格
            </label>
            <input id="dqWrongCount" type="number" value="3" style="width:80px;">
          </div>
        </div>

        <div class="ruleProfileGroup" data-rule-profile="attack_survival" hidden>
          <div class="row">
            <label>
              開始ポイント
              <input id="attackStartPoints" type="number" min="1" max="1000000" step="1" style="width:140px;">
              P
            </label>
          </div>

          <div class="row">
            <label>
              正解時の攻撃力
              <input id="attackCorrectDamage" type="number" min="1" max="1000000" step="1" style="width:140px;">
              P
            </label>
          </div>

          <div class="row">
            <label>
              誤答時の自傷
              <input id="attackWrongDamage" type="number" min="1" max="1000000" step="1" style="width:140px;">
              P
            </label>
          </div>
        </div>

        <div class="ruleProfileGroup" data-rule-profile="up_down" hidden>
          <div class="row">
            <label>
              正解時の加点
              <input id="upDownCorrectGain" type="number" min="1" max="1000000" step="1" style="width:140px;">
              P
            </label>
          </div>

          <div class="row">
            <label>
              勝ち抜け目標
              <input id="upDownQualifyScore" type="number" min="1" max="1000000" step="1" style="width:140px;">
              P
            </label>
          </div>

          <div class="row">
            <label>
              失格誤答数
              <input id="upDownDqWrongCount" type="number" min="1" max="1000000" step="1" style="width:140px;">
              回
            </label>
          </div>
        </div>

      </div>

      <div class="overlayPanel overlayPanelWide" id="settingsPanel" hidden>
        <h2>設定</h2>
        <div class="modalSection">
          <div class="modalSectionTitle">クイズ設定</div>
          <div class="modalSectionBody">
            <div class="row">
              <label>
                <input id="autoResetEnabled" type="checkbox">
                判定後に自動リセット
              </label>
              <label>
                待ち時間
                <input id="autoResetDelayMs" type="number" min="0" max="10000" step="10" style="width:120px;">
                ms
              </label>
            </div>

            <div class="row">
              <label>
                <input id="autoNextEnabled" type="checkbox">
                自動で次問へ
              </label>
              <label>
                待ち時間
                <input id="autoNextDelayMs" type="number" min="0" max="10000" step="50" style="width:120px;">
                ms
              </label>
            </div>

            <div class="row">
              <label>
                シンキング秒数
                <input id="thinkingSeconds" type="number" min="0" max="60" step="1" style="width:90px;">
                秒
              </label>
            </div>
          </div>
        </div>

        <div class="modalSection">
          <div class="modalSectionTitle">プリセット</div>
          <div class="modalSectionBody">
            <div class="row presetRow presetRow-export">
              <label class="presetField">
                プリセット名
                <input id="presetExportName" type="text" value="Rules">
              </label>
              <button id="exportRulePreset" class="presetActionBtn" type="button">プリセット出力</button>
            </div>
            <div class="row presetRow presetRow-apply">
              <label class="presetField presetField-select">
                プリセット選択
                <select id="rulePresetSelect"></select>
              </label>
              <button id="applyRulePreset" class="presetActionBtn" type="button">適用</button>
              <button id="refreshRulePresets" class="presetActionBtn" type="button">更新</button>
            </div>
            <div class="row">
              <button id="resetControllerPrefs" class="danger" type="button">ルール・スコア・設定初期化</button>
            </div>
          </div>
        </div>

        <div class="modalSection">
          <div class="modalSectionTitle">その他</div>
          <div class="modalSectionBody">
            <div class="row">
              <div>参加用URL：</div>
              <span id="joinUrls"></span>
            </div>
          </div>
        </div>

      </div>

      <div class="overlayPanel" id="visualSettingsPanel" hidden>
        <h2>表示設定</h2>
        <div class="modalSection">
          <div class="modalSectionTitle">全体</div>
          <div class="modalSectionBody">
            <div class="row">
              <label><input id="backgroundDarkTheme" type="checkbox"> 背景ダークモード</label>
              <label><input id="playerTileDarkTheme" type="checkbox"> プレイヤータイル ダークモード</label>
              <label class="judgeColorSampleLabel">
                <input id="swapJudgeColors" type="checkbox">
                <span>正誤色を入れ替える</span>
                <span class="judgeColorSample" aria-hidden="true">
                  <span class="judgeColorChip judgeColorChipCorrect">○</span>
                  <span class="judgeColorChip judgeColorChipWrong">✕</span>
                </span>
              </label>
            </div>
          </div>
        </div>

        <div class="modalSection">
          <div class="modalSectionTitle">リーチ演出</div>
          <div class="modalSectionBody">
            <div class="row">
              <label>
                <input id="qualifyReachEnabled" type="checkbox">
                勝ち抜けリーチ演出
              </label>
              <label>
                <input id="dqReachEnabled" type="checkbox">
                失格リーチ演出
              </label>
            </div>
          </div>
        </div>

        <div class="modalSection">
          <div class="modalSectionTitle">プレイヤー表示</div>
            <div class="modalSectionBody">
            <div class="modalSubsectionTitle">プレイヤーソート</div>
            <div class="row">
              <label>
                Controller並び
                <select id="controllerSortMode">
                  <option value="manual">マニュアルソート</option>
                  <option value="rank">ランクソート</option>
                </select>
              </label>
              <label>
                Visualizer並び
                <select id="visualizerSortMode">
                  <option value="manual">マニュアルソート</option>
                  <option value="rank">ランクソート</option>
                </select>
              </label>
            </div>
            <div class="row">
              <div id="playerTileLayoutToggle" class="viewToggle" role="group" aria-label="プレイヤー表示切替">
                <button id="playerTileLayoutGrid" class="viewToggleBtn is-active" type="button" title="グリッド表示" aria-label="グリッド表示">
                  <i class="fa-solid fa-grip"></i>
                </button>
                <button id="playerTileLayoutVertical" class="viewToggleBtn" type="button" title="縦書き表示" aria-label="縦書き表示">
                  <i class="fa-solid fa-grip-lines-vertical"></i>
                </button>
                <button id="playerTileLayoutSlim" class="viewToggleBtn" type="button" title="スリム型表示" aria-label="スリム型表示">
                  <i class="fa-solid fa-bars-staggered"></i>
                </button>
              </div>
            </div>

            <div class="modalSubsection" id="gridVisualOptions">
              <div class="modalSubsectionTitle">詳細設定</div>
              <div class="row">
                <label><input id="showScore" type="checkbox" checked> 得点表示</label>
                <label><input id="showCorrectCount" type="checkbox" checked> 正解数表示</label>
                <label><input id="showWrongCount" type="checkbox" checked> 誤答数表示</label>
              </div>
              <div class="row">
                <label><input id="showMarks" type="checkbox"> ○×表示</label>
                <label><input id="showMarkCorrect" type="checkbox" checked> ○</label>
                <label><input id="showMarkWrong" type="checkbox" checked> ✕</label>
              </div>
              <div class="row">
                <label><input id="prioritizePressedPlayers" type="checkbox"> グリッドで押下順を優先</label>
              </div>
            </div>

            <div class="modalSubsection" id="verticalVisualOptions" hidden>
              <div class="modalSubsectionTitle">詳細設定</div>
              <div class="row">
                <label><input id="showVerticalScore" type="checkbox" checked> 得点</label>
                <label><input id="showVerticalCorrectCount" type="checkbox" checked> 正解数</label>
                <label><input id="showVerticalWrongCount" type="checkbox" checked> 誤答数</label>
                <label><input id="showVerticalRestCount" type="checkbox" checked> 休み数</label>
                <label><input id="showVerticalBuzzOrder" type="checkbox" checked> 着順・着差</label>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="overlayPanel" id="modsSettingPanel" hidden>
        <h2>MOD</h2>
        <div class="modalSectionBody">
          <div class="row">
            <div>MOD選択</div>
            <select id="modSelect"></select>
            <button id="modApply">Apply</button>
            <button id="modReset">Reset</button>
          </div>
          <div class="row">
            <label><input id="modBackgroundDarkTheme" type="checkbox"> 背景ダークモード</label>
            <label><input id="modPlayerTileDarkTheme" type="checkbox"> プレイヤータイル ダークモード</label>
          </div>
        </div>
      </div>

      <div class="overlayPanel" id="helpPanel" hidden>
        <h2>ヘルプ</h2>
        <div class="modalSection">
          <div class="modalSectionTitle">キーバインド</div>
          <div class="modalSectionBody helpList">
            <div class="helpItem"><span class="helpKey">q / テンキー 2</span><span class="helpDesc">出題</span></div>
            <div class="helpItem"><span class="helpKey">r / テンキー 1</span><span class="helpDesc">リセット</span></div>
            <div class="helpItem"><span class="helpKey">t / テンキー 3</span><span class="helpDesc">長考</span></div>
            <div class="helpItem"><span class="helpKey">o / テンキー 0</span><span class="helpDesc">正解</span></div>
            <div class="helpItem"><span class="helpKey">x / テンキー . / Del</span><span class="helpDesc">誤答 / スルー（誰も押していない時）</span></div>
            <div class="helpItem"><span class="helpKey">Backspace</span><span class="helpDesc">スルー</span></div>
            <div class="helpItem"><span class="helpKey">テンキー Enter</span><span class="helpDesc">MOD用ボタン</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>    

  <div id="controllerLayout" class="layout">
    <section class="leftTopPane">
      <div id="topLeftTools">
        <button id="openRules" class="iconBtn" title="ルール"><i class="fa-solid fa-clipboard-list"></i></button>
        <button id="openVisualSettings" class="iconBtn" title="表示設定"><i class="fa-solid fa-display"></i></button>
        <button id="openSettings" class="iconBtn" title="設定"><i class="fa-solid fa-gear"></i></button>
        <button id="openHelp" class="iconBtn" title="ヘルプ"><i class="fa-solid fa-circle-question"></i></button>
        <button id="openModsSettings" class="iconBtn" title="MOD"><i class="fa-solid fa-puzzle-piece"></i></button>
        <button id="toggleJoinQrTop" class="iconBtn" title="QRコード表示"><i class="fa-solid fa-qrcode"></i></button>
        <button id="toggleRulesOverlay" class="iconBtn topToolsSpacer" title="ルールを表示"><i class="fa-solid fa-clipboard-list"></i></button>
        <button id="toggleModScoreboard" class="iconBtn" title="得点板を表示"><i class="fa-solid fa-table-cells-large"></i></button>
        <button id="toggleBoardAnswerMode" class="iconBtn" title="ボード解答"><i class="fa-solid fa-pen-to-square"></i></button>
        <button id="toggleScoreHidden" class="iconBtn" title="得点を非表示"><span class="iconBtnLabel">？</span></button>
        <button id="toggleTitleScreen" class="iconBtn" title="蓋画を表示"><span class="iconBtnLabel">蓋</span></button>
        <button id="acReset" class="iconBtn iconBtnDanger" title="AC">AC</button>
      </div>

      <div id="controllerRoot" class="mainTop">
        <div class="progressPanel">
        <div class="row progressRow progressActions">
          <div class="progressMainButtons">
            <label class="qnoInline">
              <span>Q</span>
              <input id="qno" type="number" min="0" step="1" value="0">
            </label>
            <button id="buzzerReset">リセット</button>
            <button id="present">出題</button>
            <button id="skip">スルー</button>
            <button id="thinking">長考</button>
            <span class="progressDivider" aria-hidden="true"></span>
            <button id="correct">正解</button>
            <button id="wrong" class="spacedAfterCorrect">誤答</button>
          </div>
        </div>
        </div>
      </div>
    </section>

    <aside id="modPanel" class="modPanel" hidden>
      <div class="modPanelBody" id="modPanelBody">
        <!-- iframeをここに挿す -->
      </div>
    </aside>

    <section class="playersSection">
      <div class="sectionHeader">
        <div class="playersHeaderLeft">
          <h2>Players</h2>
          <div id="playersViewToggle" class="viewToggle" role="group" aria-label="Players表示切替">
            <button id="playersViewGrid" class="viewToggleBtn is-active" type="button" title="グリッド表示" aria-label="グリッド表示">
              <i class="fa-solid fa-grip"></i>
            </button>
            <button id="playersViewTable" class="viewToggleBtn" type="button" title="テーブル表示" aria-label="テーブル表示">
              <i class="fa-solid fa-table-list"></i>
            </button>
          </div>
          <button id="boardJudge" type="button">判定</button>
          <button id="boardAnswerClear" type="button">解答クリア</button>
        </div>
        <div id="playerCount" class="playerCount">0人接続中</div>
      </div>
      <div id="playersGrid" class="grid playersGrid"></div>
    </section>

    <script src="/common/numberInputWheel.js"></script>
    <script type="module" src="/controller/controller.js"></script>
  </div>
</body>
</html>
