<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="/common/common.css" />
  <link rel="stylesheet" href="/player/player.css" />
  <link rel="icon" href="/favicon.ico">
</head>
<body>
  <!-- 中央UI -->
  <main class="center">
    <div id="indicator" class="indicator" tabindex="0"></div>

    <button id="bigBtn" class="bigBtn" type="button">
      <span id="bigBtnLabel" class="bigBtnLabel">CONNECT</span>
    </button>
  </main>

  <!-- 右寄せの情報パネル（旧card） -->
  <aside class="side">
    <div class="card">
      <div class="row">
        <div class="label">名前</div>
        <div class="nameValueWrap">
          <div id="name" class="value">-</div>
          <button id="editNameBtn" class="iconPencilBtn" type="button" title="名前を変更" aria-label="名前を変更">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 17.25V21h3.75L17.8 9.94l-3.75-3.75L3 17.25zm14.71-9.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0l-1.54 1.54 3.75 3.75 1.71-1.37z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="row">
        <div class="label">得点</div>
        <div id="score" class="value">0</div>
      </div>
      <div class="row">
        <div class="label">誤答</div>
        <div id="wrongCount" class="value">0</div>
      </div>
      <div class="row">
        <div class="label">順位</div>
        <div id="pointRank" class="value">-</div>
      </div>
      <div class="row">
        <div class="label">休み</div>
        <div id="rest" class="value">-</div>
      </div>
    </div>
  </aside>

<script type="module" src="/player/player.js?v=20260329_02"></script>
</body>
</html>
